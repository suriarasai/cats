# CATS - Course Administration Training System
spring.application.name=CATS


# Data Source Configuration
# --- H2 Configuration  ---
spring.datasource.url=jdbc:h2:mem:cats_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Connection Pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-test-query=SELECT 1


# Hibernate 
# DDL auto (create, create-drop, validate, update, none)
# IMPORTANT: Use 'validate' or 'none' in production!
spring.jpa.hibernate.ddl-auto=update


# Show SQL queries (disable in production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logger 
logging.level.root=INFO
logging.level.sg.edu.iss.cats=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log file configuration
logging.file.name=logs/cats-application.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n


# Date format
spring.mvc.format.date=dd-MM-yyyy
spring.mvc.format.date-time=dd-MM-yyyy HH:mm:ss
spring.mvc.format.time=HH:mm:ss

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600


# Thymeleaf
spring.thymeleaf.mode=HTML

# Security Session management
spring.session.timeout=30m
